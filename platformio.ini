; File: platformio.ini
; Ayurvedic Nadi Pariksha - ESP32 PlatformIO Configuration
; नाड़ी परीक्षण - ESP32 PlatformIO कॉन्फिगरेशन
; Two separate environments to prevent compile clashes
; संकलन टकराव को रोकने के लिए दो अलग-अलग वातावरण

[platformio]
default_envs = virtual

[common]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
    ; No external libraries needed for basic WiFi/Timer functionality
    ; बुनियादी WiFi/Timer कार्यक्षमता के लिए कोई बाहरी लाइब्रेरी नहीं चाहिए

[env:virtual]
; ESP32 Virtual/Dummy Emulator Environment
; ESP32 वर्चुअल/डमी एमुलेटर वातावरण
; Simulates pulse data without hardware sensor
; बिना हार्डवेयर सेंसर के पल्स डेटा अनुकरण करता है
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
lib_deps = ${common.lib_deps}

; CRITICAL: Only compile virtual_dummy.cpp, exclude hardware_main.cpp
; महत्वपूर्ण: केवल virtual_dummy.cpp संकलित करें, hardware_main.cpp को बाहर करें
build_src_filter = +<virtual_dummy.cpp> -<hardware_main.cpp>

; Build flags for virtual environment
build_flags = 
    -D VIRTUAL_MODE=1
    -D CORE_DEBUG_LEVEL=3
    -Wno-unused-variable
    -Wno-unused-but-set-variable

[env:hardware]
; ESP32 Real Hardware Environment  
; ESP32 वास्तविक हार्डवेयर वातावरण
; Reads from actual piezo sensor via ADC
; ADC के माध्यम से वास्तविक पाइज़ो सेंसर से पढ़ता है
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
lib_deps = ${common.lib_deps}

; CRITICAL: Only compile hardware_main.cpp, exclude virtual_dummy.cpp
; महत्वपूर्ण: केवल hardware_main.cpp संकलित करें, virtual_dummy.cpp को बाहर करें
build_src_filter = +<hardware_main.cpp> -<virtual_dummy.cpp>

; Build flags for hardware environment
build_flags = 
    -D HARDWARE_MODE=1
    -D CORE_DEBUG_LEVEL=3
    -D ADC_PIN=34
    -Wno-unused-variable
    -Wno-unused-but-set-variable

; OTA Update configuration (optional)
; OTA अपडेट कॉन्फिगरेशन (वैकल्पिक)
; upload_protocol = espota
; upload_port = 192.168.1.XXX
; upload_flags =
;     --port=3232
;     --auth=YOUR_OTA_PASSWORD
